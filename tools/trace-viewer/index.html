<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PLang Execution Tree</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --line:#262b36; --text:#d7dce5; --muted:#8a93a6;
    --act:#e0af68; --cs:#7dcfff; --goal:#7aa2f7; --step:#9ece6a;
    --ok:#9ece6a; --bad:#f7768e; --fork:#bb9af7;
  }
  *{box-sizing:border-box}
  body{margin:0;font:13px/1.6 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
       background:var(--bg);color:var(--text)}
  header{padding:12px 18px;border-bottom:1px solid var(--line)}
  header h1{font-size:14px;margin:0 0 2px;font-weight:600}
  header .legend{color:var(--muted);font-size:12px}
  header .ctrls{margin-top:8px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  header label{color:var(--muted);cursor:pointer;user-select:none}
  main{padding:18px 22px;max-width:1100px}

  .node{position:relative}
  .kids{margin-left:16px;border-left:1px solid var(--line);padding-left:14px}
  .row{display:flex;align-items:baseline;gap:8px;padding:1px 0;border-radius:4px}
  .row:hover{background:#1e2230}
  .tw{cursor:pointer;color:var(--muted);width:12px;flex:0 0 12px;display:inline-block}
  .badge{flex:0 0 auto;font-size:10px;padding:0 5px;border-radius:4px;text-transform:uppercase;
         letter-spacing:.5px;color:#0f1115;font-weight:700}
  .b-act{background:var(--act)} .b-cs{background:var(--cs)}
  .b-goal{background:var(--goal)} .b-step{background:var(--step)}
  .name{color:var(--text)} .sig{color:var(--muted);font-size:11px}
  .ret{color:var(--cs)} .ret::before{content:"→ "}
  .warn{color:var(--bad)}

  /* fork */
  .fork{margin:4px 0;border-left:3px solid var(--fork);padding:4px 0 4px 10px;border-radius:0 6px 6px 0;background:#1a1726}
  .fork.bad{border-left-color:var(--bad);background:#221620}
  .fork-head{display:flex;align-items:baseline;gap:8px}
  .fork-mark{color:var(--fork);font-weight:700}
  .fork.bad .fork-mark{color:var(--bad)}
  .fork-q{color:var(--fork)} .fork.bad .fork-q{color:#ffb4c0}
  .fork-tag{font-size:10px;padding:0 6px;border-radius:10px;color:#0f1115;font-weight:700}
  .tag-ok{background:var(--ok)} .tag-bad{background:var(--bad)}
  .arm{margin:4px 0 4px 14px;border-left:1px dashed var(--line);padding-left:12px}
  .arm-label{display:inline-block;font-size:11px;padding:0 7px;border-radius:10px;
             background:#2a2f3c;color:var(--muted);margin:2px 0}
  .arm-ret{color:var(--cs);margin-left:8px}.arm-ret::before{content:"⇒ "}

  .outcomes{margin-top:18px;border-top:1px solid var(--line);padding-top:10px}
  .outcomes h3{font-size:12px;color:var(--muted);margin:0 0 6px;text-transform:uppercase;letter-spacing:.5px}
  .outcome{display:flex;gap:10px;padding:2px 0}
  .outcome .lab{flex:0 0 110px;color:var(--muted)}
  .collapsed > .kids{display:none}
  .hidecs.dimcs .b-cs{opacity:.45}
</style>
</head>
<body>
<header>
  <h1 id="title">PLang Execution Tree</h1>
  <div class="legend" id="legend"></div>
  <div class="ctrls">
    <label><input type="checkbox" id="dimcs"> dim C# leaves (show the forks)</label>
    <label style="margin-left:auto">load tree.json <input type="file" id="file" accept=".json"></label>
  </div>
</header>
<main id="tree"></main>

<script>
const $ = id => document.getElementById(id);
function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function renderNode(n){
  if(n.fork) return renderFork(n);
  const wrap = document.createElement('div'); wrap.className='node';
  const row = document.createElement('div'); row.className='row';
  const kids = (n.children||[]);
  const hasKids = kids.length>0;
  row.innerHTML =
    `<span class="tw">${hasKids?'▾':''}</span>`+
    (n.kind?`<span class="badge b-${n.kind}">${esc(n.kind)}</span>`:'')+
    `<span class="name">${esc(n.n)}</span>`+
    (n.sig?` <span class="sig">${esc(n.sig)}</span>`:'')+
    (n.ret?` <span class="ret">${esc(n.ret)}</span>`:'')+
    (n.warn?` <span class="warn">⚠ ${esc(n.warn)}</span>`:'');
  wrap.appendChild(row);
  if(hasKids){
    const kc = document.createElement('div'); kc.className='kids';
    kids.forEach(c=>kc.appendChild(renderNode(c)));
    wrap.appendChild(kc);
    row.querySelector('.tw').onclick = ()=>{
      wrap.classList.toggle('collapsed');
      row.querySelector('.tw').textContent = wrap.classList.contains('collapsed')?'▸':'▾';
    };
  }
  return wrap;
}

function renderFork(f){
  const box = document.createElement('div');
  box.className = 'fork node' + (f.reconverges ? '' : ' bad');
  const head = document.createElement('div'); head.className='fork-head';
  head.innerHTML =
    `<span class="fork-mark">⑂ fork</span>`+
    `<span class="fork-q">${esc(f.q)}</span>`+
    (f.at?` <span class="sig">@ ${esc(f.at)}</span>`:'')+
    (f.reconverges
       ? ` <span class="fork-tag tag-ok">reconverges</span>`
       : ` <span class="fork-tag tag-bad">diverges — never rejoins</span>`);
  box.appendChild(head);
  (f.arms||[]).forEach(a=>{
    const arm = document.createElement('div'); arm.className='arm';
    const lab = document.createElement('div');
    lab.innerHTML = `<span class="arm-label">${esc(a.label)}</span>`+
      (a.ret?`<span class="arm-ret">${esc(a.ret)}</span>`:'')+
      (a.warn?` <span class="warn">⚠ ${esc(a.warn)}</span>`:'');
    arm.appendChild(lab);
    (a.children||[]).forEach(c=>arm.appendChild(renderNode(c)));
    box.appendChild(arm);
  });
  return box;
}

function render(model){
  $('title').textContent = model.title || 'PLang Execution Tree';
  $('legend').textContent = model.legend || '';
  const root = $('tree'); root.innerHTML='';
  root.appendChild(renderNode(model.root));
  if(model.root.outcomes){
    const o = document.createElement('div'); o.className='outcomes';
    o.innerHTML = '<h3>final outcome per path</h3>' +
      model.root.outcomes.map(x=>
        `<div class="outcome"><span class="lab">${esc(x.label)}</span><span class="ret">${esc(x.ret)}</span></div>`).join('');
    root.appendChild(o);
  }
  applyDim();
}

function applyDim(){
  const t = $('tree');
  t.classList.toggle('hidecs', true);
  t.classList.toggle('dimcs', $('dimcs').checked);
}
$('dimcs').addEventListener('change', applyDim);
$('file').addEventListener('change', e=>{
  const fr=new FileReader(); fr.onload=()=>render(JSON.parse(fr.result)); fr.readAsText(e.target.files[0]);
});

fetch('tree.json').then(r=>r.ok?r.json():Promise.reject()).then(render)
  .catch(()=>{ $('legend').textContent='— pick tree.json via "load tree.json" →'; });
</script>
</body>
</html>
