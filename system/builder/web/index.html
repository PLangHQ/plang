<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLang Builder Trace</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --text: #eee;
    --text-dim: #999;
    --border: #2a2a4a;
    --green: #4ecca3;
    --yellow: #f0c040;
    --orange: #e87040;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Sidebar */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #sidebar header .status {
    font-size: 11px;
    color: var(--text-dim);
  }
  #sidebar header .status.live {
    color: var(--green);
  }
  #goal-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .goal-item {
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .goal-item:hover { background: var(--surface2); }
  .goal-item.active { background: var(--surface2); border-left: 3px solid var(--accent); }
  .goal-item .badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 10px;
    background: var(--surface2);
  }
  .goal-item .badge.has-detail { background: var(--yellow); color: #000; }
  .goal-item .changed-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    margin-left: 6px;
  }

  /* Main */
  #main {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }
  #main.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 15px;
  }

  /* Sections */
  .trace-header {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .trace-header .tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--surface2);
    font-weight: 400;
  }

  .section {
    margin-bottom: 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .section-title {
    padding: 12px 16px;
    background: var(--surface);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    font-weight: 600;
    user-select: none;
  }
  .section-title:hover { background: var(--surface2); }
  .section-title .arrow {
    transition: transform 0.2s;
    font-size: 11px;
  }
  .section-title .arrow.open { transform: rotate(90deg); }
  .section-body {
    display: none;
    padding: 0;
  }
  .section-body.open { display: block; }

  /* Prompt/Response blocks */
  .block {
    border-top: 1px solid var(--border);
  }
  .block-label {
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-dim);
    background: rgba(0,0,0,0.2);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .block-label:hover { color: var(--text); }
  .block-content {
    display: none;
    max-height: 600px;
    overflow: auto;
    padding: 12px 16px;
    background: rgba(0,0,0,0.3);
  }
  .block-content.open { display: block; }
  pre {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Step summary table */
  .steps-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .steps-table th {
    text-align: left;
    padding: 8px 12px;
    background: rgba(0,0,0,0.2);
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 10px;
  }
  .steps-table td {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    vertical-align: top;
  }
  .level-high { color: var(--green); }
  .level-medium { color: var(--yellow); }
  .level-low { color: var(--accent); }

  /* Detail pass card */
  .detail-pass {
    margin: 8px 16px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .detail-pass-header {
    padding: 10px 14px;
    background: var(--surface);
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .detail-pass-header .step-text {
    font-weight: 600;
  }
  .detail-pass-header .reason {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .reason-medium { background: var(--yellow); color: #000; }
  .reason-low { background: var(--orange); color: #000; }
  .reason-validation { background: var(--accent); color: #fff; }

  /* PLang formatted view */
  .plang-view {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.15);
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.8;
    white-space: pre-wrap;
  }
  .pv-step { color: var(--text-dim); display: block; margin-top: 4px; }
  .pv-step:first-child { margin-top: 0; }
  .pv-conf-high { color: var(--green); font-size: 10px; }
  .pv-conf-med { color: var(--yellow); font-size: 10px; }
  .pv-conf-low { color: var(--accent); font-size: 10px; }
  .pv-action { color: var(--green); display: block; }
  .pv-modifier { color: var(--orange); display: block; font-size: 11px; }

  /* Auto-refresh toggle */
  #controls {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #controls label { cursor: pointer; color: var(--text-dim); }
  #controls input[type="checkbox"] { cursor: pointer; }
</style>
</head>
<body>

<div id="sidebar">
  <header>
    <span>Builder Trace</span>
    <span class="status" id="status">waiting</span>
  </header>
  <div id="goal-list"></div>
  <div id="controls">
    <input type="checkbox" id="auto-refresh" checked>
    <label for="auto-refresh">Auto-refresh (3s)</label>
  </div>
</div>

<div id="main" class="empty">
  <span>Select a goal or waiting for build data...</span>
</div>

<script>
// Default: traces relative to app root. Override with ?traces=path
const params = new URLSearchParams(location.search);
const TRACE_BASE = params.get('traces') || '/.build/traces';
const POLL_MS = 3000;

let goals = [];
let traces = {};          // current fetched data per goal
let traceHashes = {};     // hash of last fetched JSON per goal
let displayedHash = {};   // hash of what's currently rendered per goal
let changedGoals = new Set(); // goals with newer data than what's displayed
let selectedGoal = null;
let initialLoad = true;

function hashString(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  }
  return h.toString(36);
}

async function fetchJson(url) {
  try {
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) return null;
    return await r.text(); // return raw text so we can hash it
  } catch { return null; }
}

async function poll() {
  const manifestText = await fetchJson(`${TRACE_BASE}/manifest.json`);
  const statusEl = document.getElementById('status');

  if (!manifestText) {
    statusEl.textContent = 'no data';
    statusEl.className = 'status';
    return;
  }

  statusEl.textContent = 'live';
  statusEl.className = 'status live';

  const manifest = JSON.parse(manifestText);
  const goalNames = Array.isArray(manifest) ? manifest : (manifest.goals || []);

  // Detect new goals
  const hadNewGoals = goalNames.some(n => !goals.includes(n));
  goals = goalNames;

  // Fetch all traces, detect changes via hash
  for (const name of goalNames) {
    const raw = await fetchJson(`${TRACE_BASE}/${name}.json`);
    if (!raw) continue;

    const newHash = hashString(raw);
    if (newHash !== traceHashes[name]) {
      traces[name] = JSON.parse(raw);
      traceHashes[name] = newHash;

      // If we already displayed this goal and the data changed, mark it
      if (displayedHash[name] && displayedHash[name] !== newHash) {
        changedGoals.add(name);
      }
    }
  }

  renderGoalList();

  // On first load, auto-select BuildGoal if available, otherwise first goal
  if (initialLoad && goals.length > 0) {
    initialLoad = false;
    const defaultGoal = goals.includes('BuildGoal') ? 'BuildGoal' : goals[0];
    selectGoal(defaultGoal);
  }
}

function renderGoalList() {
  const list = document.getElementById('goal-list');
  list.innerHTML = '';

  for (const name of goals) {
    const trace = traces[name];
    const div = document.createElement('div');
    div.className = 'goal-item' + (name === selectedGoal ? ' active' : '');
    const detailCount = trace?.detailPasses?.length || 0;
    const hasChanged = changedGoals.has(name);
    div.innerHTML = `
      ${hasChanged ? '<div class="changed-dot"></div>' : ''}
      <span>${esc(name)}</span>
      ${detailCount > 0 ? `<span class="badge has-detail">${detailCount} detail</span>` : '<span class="badge">ready</span>'}
    `;
    div.onclick = () => selectGoal(name);
    list.appendChild(div);
  }
}

function selectGoal(name) {
  selectedGoal = name;
  changedGoals.delete(name); // clear changed indicator
  renderGoalList();
  const trace = traces[name];
  if (trace) {
    renderTrace(trace);
    displayedHash[name] = traceHashes[name]; // mark as displayed
  }
}

function renderTrace(trace) {
  const main = document.getElementById('main');
  main.className = '';

  const steps = trace.pass1?.response?.steps || [];
  const detailPasses = trace.detailPasses || [];
  const stepCount = steps.length;
  const detailCount = detailPasses.length;

  let html = `
    <div class="trace-header">
      ${esc(trace.goal)}
      <span class="tag">${stepCount} steps</span>
      ${detailCount > 0 ? `<span class="tag">${detailCount} detail passes</span>` : ''}
    </div>
  `;

  // Step summary table
  html += `<div class="section">
    <div class="section-title" onclick="toggleSection(this)">
      <span>Step Overview</span>
      <span class="arrow open">&#9654;</span>
    </div>
    <div class="section-body open">
      <table class="steps-table">
        <tr><th>#</th><th>Guidance</th><th>Module.Action</th><th>Level</th><th>Conf</th><th>Group</th></tr>
        ${steps.map(s => {
          const actions = (s.actions || []).map(a => `${a.module}.${a.action}`).join(', ');
          const conf = s.confidence ?? 0;
          const levelClass = conf >= 85 ? 'level-high' : conf >= 50 ? 'level-medium' : 'level-low';
          return `<tr>
            <td>${s.index}</td>
            <td>${esc(s.guidance || '')}</td>
            <td><code>${esc(actions)}</code></td>
            <td class="${levelClass}">${esc(s.level || '?')}</td>
            <td>${s.confidence ?? '?'}</td>
            <td>${esc(s.group || '-')}</td>
          </tr>`;
        }).join('')}
      </table>
    </div>
  </div>`;

  // Pass 1 prompts
  html += renderPromptSection('Pass 1 — BuildGoal', trace.pass1?.system, trace.pass1?.user, trace.pass1?.response, true);

  // Detail passes
  if (detailPasses.length > 0) {
    html += `<div class="section">
      <div class="section-title" onclick="toggleSection(this)">
        <span>Detail Passes (${detailPasses.length})</span>
        <span class="arrow open">&#9654;</span>
      </div>
      <div class="section-body open">
        ${detailPasses.map((dp, i) => {
          const reasonClass = dp.level === 'low' ? 'reason-low' : dp.level === 'medium' ? 'reason-medium' : 'reason-validation';
          return `<div class="detail-pass">
            <div class="detail-pass-header">
              <span class="step-text">[${dp.stepIndex}] ${esc(dp.stepText || '')}</span>
              <span class="reason ${reasonClass}">${esc(dp.level || 'validation')}</span>
            </div>
            ${renderPromptBlocks(dp.system, dp.user, dp.response)}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  main.innerHTML = html;
}

function renderPromptSection(title, system, user, response, open = false) {
  return `<div class="section">
    <div class="section-title" onclick="toggleSection(this)">
      <span>${esc(title)}</span>
      <span class="arrow${open ? ' open' : ''}">&#9654;</span>
    </div>
    <div class="section-body${open ? ' open' : ''}">
      ${renderPromptBlocks(system, user, response)}
    </div>
  </div>`;
}

function renderPromptBlocks(system, user, response) {
  return `
    ${system ? `<div class="block">
      <div class="block-label" onclick="toggleBlock(this)">
        <span>System Prompt</span>
        <span>${estimateSize(system)}</span>
      </div>
      <div class="block-content"><pre>${esc(typeof system === 'string' ? system : JSON.stringify(system, null, 2))}</pre></div>
    </div>` : ''}
    ${user ? `<div class="block">
      <div class="block-label" onclick="toggleBlock(this)">
        <span>User Prompt</span>
        <span>${estimateSize(user)}</span>
      </div>
      <div class="block-content open"><pre>${esc(typeof user === 'string' ? user : JSON.stringify(user, null, 2))}</pre></div>
    </div>` : ''}
    ${response ? `<div class="block">
      <div class="block-label" onclick="toggleBlock(this)">
        <span>LLM Response</span>
        <span>${estimateSize(response)}</span>
      </div>
      <div class="block-content open">
        ${formatPlangView(response)}
        <pre>${esc(typeof response === 'string' ? response : JSON.stringify(response, null, 2))}</pre>
      </div>
    </div>` : ''}
  `;
}

function formatPlangView(response) {
  if (!response || typeof response === 'string') return '';
  const steps = response.steps || (response.actions ? [response] : null);
  if (!steps) return '';

  let lines = [];
  for (const step of steps) {
    const actions = step.actions || [];
    if (actions.length === 0) continue;

    // Step header if it has index/guidance
    if (step.index !== undefined) {
      const level = step.level || '?';
      const conf = step.confidence ?? '?';
      const group = step.group ? ` group=${step.group}` : '';
      const confClass = typeof conf === 'number' ? (conf >= 85 ? 'pv-conf-high' : conf >= 50 ? 'pv-conf-med' : 'pv-conf-low') : 'pv-conf-med';
      lines.push(`<span class="pv-step">[${step.index}] ${esc(step.guidance || '')} <span class="${confClass}">${level} ${conf}%${group}</span></span>`);
    }

    for (const a of actions) {
      const params = (a.parameters || []).map(p => {
        const type = p.type ? `[${p.type}] ` : '';
        let val = p.value;
        if (val !== null && typeof val === 'object') val = JSON.stringify(val);
        return `${esc(p.name)}(${type}${esc(String(val ?? ''))})`;
      }).join(', ');
      lines.push(`<span class="pv-action">  - ${esc(a.module)}.${esc(a.action)} ${params}</span>`);
    }

    // Step modifiers
    if (step.onError) {
      const oe = step.onError;
      let parts = [];
      if (oe.retryCount) parts.push(`retry ${oe.retryCount}`);
      if (oe.goal?.name) parts.push(`call ${oe.goal.name}`);
      if (oe.ignoreError) parts.push('ignore');
      if (oe.order) parts.push(`order=${oe.order}`);
      lines.push(`<span class="pv-modifier">    onError: ${esc(parts.join(', '))}</span>`);
    }
    if (step.cache) {
      const c = step.cache;
      let parts = [`${c.durationMs}ms`];
      if (c.sliding) parts.push('sliding');
      lines.push(`<span class="pv-modifier">    cache: ${esc(parts.join(', '))}</span>`);
    }
  }

  if (lines.length === 0) return '';
  return `<div class="plang-view">${lines.join('\n')}</div>`;
}

function toggleSection(el) {
  const body = el.nextElementSibling;
  const arrow = el.querySelector('.arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function toggleBlock(el) {
  el.nextElementSibling.classList.toggle('open');
}

function estimateSize(val) {
  const str = typeof val === 'string' ? val : JSON.stringify(val);
  const bytes = new Blob([str]).size;
  if (bytes < 1024) return bytes + 'B';
  return (bytes / 1024).toFixed(1) + 'KB';
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

// Polling
function startPolling() {
  poll();
  setInterval(() => {
    if (document.getElementById('auto-refresh').checked) {
      poll();
    }
  }, POLL_MS);
}

startPolling();
</script>
</body>
</html>
